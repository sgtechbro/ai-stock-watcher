name: Update Earnings Data

on:
  schedule:
    # Runs every Saturday at 14:00 UTC during earnings months (Jan, Apr, Jul, Oct)
    # Captures any earnings reported Mon–Fri that week
    - cron: '0 14 * 1,4,7,10 6'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-earnings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update earnings data
        run: node scripts/update-earnings.mjs
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stocks.ts
          git diff --cached --quiet || (git commit -m "chore: update earnings data $(date -u +%Y-%m-%d)" && git push)

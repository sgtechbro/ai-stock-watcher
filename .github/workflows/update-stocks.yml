name: Update Stock Prices

on:
  schedule:
    # Runs at 10:30 PM UTC (6:30 PM ET) on weekdays — ~6hrs after market close
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update stock prices
        run: node scripts/update-stocks.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stocks.ts
          git diff --cached --quiet || (git commit -m "chore: update stock prices $(date -u +%Y-%m-%d)" && git push)
